# ════════════════════════════════════════════════════════════════════════════
# PROMOVIX — Netlify configuration
# ════════════════════════════════════════════════════════════════════════════
# This file MUST be uploaded to the same root folder as index.html.
# It does two things:
#   1. Adds security headers (X-Frame-Options, CSP, etc.)
#   2. Tells Netlify's server to serve .wasm files with the correct MIME type
#      (application/wasm). Without this, some browsers refuse to execute the
#      WebAssembly module and the Growth Simulator will fail to load.
# ════════════════════════════════════════════════════════════════════════════

# No build step — this is a plain static site. Publish the folder exactly as-is
# so Netlify never tries to run npm/install/build (which is what broke before).
[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Correct MIME type for WebAssembly binaries — required for the C++ engine to run
[[headers]]
  for = "/wasm/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/wasm/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# GSAP is self-hosted (index-v4 preview) — long-cache since filenames are versioned by content
[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service-panel background-loop videos — not content-hashed, so a shorter cache
# (not "immutable") lets a replaced file propagate within a week instead of a year
[[headers]]
  for = "/assets/service-videos/*.mp4"
  [headers.values]
    Content-Type = "video/mp4"
    Cache-Control = "public, max-age=604800"
